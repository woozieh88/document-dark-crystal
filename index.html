<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MIVUBI Documentation</title>
  <link rel="icon" href="assets/logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Fira+Code:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f8fb;
      --surface: #ffffff;
      --surface-strong: #eef2f7;
      --text: #172033;
      --muted: #667085;
      --subtle: #d8dee8;
      --border: #e3e8f0;
      --accent: #2563eb;
      --accent-strong: #1d4ed8;
      --accent-soft: #dbeafe;
      --success: #0f766e;
      --code-bg: #111827;
      --code-text: #dbeafe;
      --shadow: 0 18px 60px rgba(23, 32, 51, 0.12);
      --radius: 8px;
      --header-height: 72px;
      --content-width: 860px;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    [data-theme="dark"] {
      color-scheme: dark;
      --bg: #0d1117;
      --surface: #151b23;
      --surface-strong: #1f2937;
      --text: #e6edf3;
      --muted: #9aa7b6;
      --subtle: #334155;
      --border: #263244;
      --accent: #6ea8fe;
      --accent-strong: #93c5fd;
      --accent-soft: #172554;
      --success: #5eead4;
      --code-bg: #080b10;
      --code-text: #d7e7ff;
      --shadow: 0 20px 70px rgba(0, 0, 0, 0.4);
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(37, 99, 235, 0.08), transparent 30rem),
        linear-gradient(180deg, var(--bg), var(--bg));
      color: var(--text);
      transition: background 180ms ease, color 180ms ease;
    }

    button,
    a {
      font: inherit;
    }

    a {
      color: inherit;
    }

    .skip-link {
      position: fixed;
      left: 1rem;
      top: 1rem;
      z-index: 200;
      transform: translateY(-150%);
      background: var(--text);
      color: var(--bg);
      padding: 0.7rem 1rem;
      border-radius: var(--radius);
      text-decoration: none;
      transition: transform 160ms ease;
    }

    .skip-link:focus {
      transform: translateY(0);
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 100;
      min-height: var(--header-height);
      border-bottom: 1px solid var(--border);
      background: color-mix(in srgb, var(--surface) 90%, transparent);
      backdrop-filter: blur(18px);
    }

    .topbar-inner {
      display: flex;
      align-items: center;
      gap: 1rem;
      max-width: 1440px;
      min-height: var(--header-height);
      margin: 0 auto;
      padding: 0 1.2rem;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      min-width: 0;
      margin-right: auto;
    }

    .brand-mark {
      display: grid;
      place-items: center;
      width: 2.35rem;
      height: 2.35rem;
      flex: 0 0 auto;
      overflow: hidden;
      padding: 0;
      border-radius: var(--radius);
      background: transparent;
      color: var(--text);
      font-weight: 800;
      letter-spacing: 0;
    }

    .brand-mark img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
      filter: brightness(0);
    }

    [data-theme="dark"] .brand-mark img {
      filter: none;
    }

    .brand-copy {
      min-width: 0;
    }

    .brand-title {
      margin: 0;
      overflow: hidden;
      font-size: 0.98rem;
      font-weight: 760;
      line-height: 1.2;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .brand-subtitle {
      margin: 0.12rem 0 0;
      overflow: hidden;
      color: var(--muted);
      font-size: 0.8rem;
      line-height: 1.2;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 0.55rem;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .icon-button,
    .text-button,
    .nav-toggle {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 2.35rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      transition: transform 150ms ease, border-color 150ms ease, background 150ms ease, color 150ms ease;
    }

    .icon-button {
      width: 2.35rem;
      padding: 0;
    }

    .text-button {
      gap: 0.45rem;
      padding: 0 0.78rem;
      font-weight: 680;
      white-space: nowrap;
    }

    .icon-button:hover,
    .text-button:hover,
    .nav-toggle:hover,
    .page-link:hover,
    .section-link:hover,
    .drive-button:hover,
    .pager-button:hover {
      transform: translateY(-1px);
      border-color: color-mix(in srgb, var(--accent) 50%, var(--border));
    }

    .icon-button:focus-visible,
    .text-button:focus-visible,
    .nav-toggle:focus-visible,
    .page-link:focus-visible,
    .section-link:focus-visible,
    .drive-button:focus-visible,
    .pager-button:focus-visible {
      outline: 3px solid color-mix(in srgb, var(--accent) 35%, transparent);
      outline-offset: 2px;
    }

    .nav-toggle {
      display: none;
      width: 2.35rem;
      padding: 0;
    }

    .lang-switch {
      display: inline-grid;
      grid-template-columns: 1fr 1fr;
      overflow: hidden;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
    }

    .lang-switch button {
      min-width: 3rem;
      min-height: 2.35rem;
      border: 0;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font-weight: 760;
    }

    .lang-switch button[aria-pressed="true"] {
      background: var(--accent);
      color: #ffffff;
    }

    .layout {
      display: grid;
      grid-template-columns: 280px minmax(0, var(--content-width)) 320px;
      gap: 1.5rem;
      max-width: 1440px;
      margin: 0 auto;
      padding: 1.5rem 1.2rem 3rem;
    }

    .sidebar,
    .summary-panel {
      align-self: start;
      position: sticky;
      top: calc(var(--header-height) + 1.5rem);
      max-height: calc(100vh - var(--header-height) - 3rem);
      overflow: auto;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: color-mix(in srgb, var(--surface) 94%, transparent);
      box-shadow: 0 1px 0 rgba(255, 255, 255, 0.04) inset;
    }

    .sidebar {
      padding: 1rem;
    }

    .sidebar-title,
    .summary-kicker,
    .toc-title {
      margin: 0 0 0.75rem;
      color: var(--muted);
      font-size: 0.76rem;
      font-weight: 800;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    .page-nav,
    .section-nav {
      display: grid;
      gap: 0.35rem;
    }

    .page-link,
    .section-link {
      width: 100%;
      border: 1px solid transparent;
      border-radius: var(--radius);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      text-align: left;
      transition: transform 150ms ease, border-color 150ms ease, background 150ms ease, color 150ms ease;
    }

    .page-link {
      padding: 0.72rem 0.75rem;
      font-weight: 720;
    }

    .section-link {
      padding: 0.48rem 0.62rem;
      font-size: 0.88rem;
    }

    .page-link.is-active,
    .section-link.is-active {
      background: var(--accent-soft);
      color: var(--accent-strong);
      border-color: color-mix(in srgb, var(--accent) 25%, transparent);
    }

    .toc {
      margin-top: 1.35rem;
      padding-top: 1.15rem;
      border-top: 1px solid var(--border);
    }

    .main {
      min-width: 0;
    }

    .doc-page {
      min-height: calc(100vh - var(--header-height) - 3rem);
      animation: page-in 220ms ease both;
    }

    @keyframes page-in {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .doc-header {
      padding: 0.35rem 0 2rem;
      border-bottom: 1px solid var(--border);
    }

    .eyebrow {
      margin: 0 0 0.8rem;
      color: var(--accent-strong);
      font-size: 0.82rem;
      font-weight: 800;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      max-width: 12ch;
      font-size: 3.25rem;
      line-height: 0.95;
      letter-spacing: 0;
    }

    .lead {
      max-width: 68ch;
      margin: 1.2rem 0 0;
      color: var(--muted);
      font-size: 1.08rem;
      line-height: 1.7;
    }

    .doc-section {
      padding: 2rem 0;
      border-bottom: 1px solid var(--border);
      scroll-margin-top: calc(var(--header-height) + 1.2rem);
    }

    .doc-section:last-of-type {
      border-bottom: 0;
    }

    .doc-section h2 {
      margin: 0 0 0.85rem;
      font-size: 1.55rem;
      line-height: 1.15;
      letter-spacing: 0;
    }

    .doc-section h3 {
      margin: 1.25rem 0 0.5rem;
      font-size: 1.05rem;
      line-height: 1.3;
    }

    .doc-section p {
      max-width: 78ch;
      margin: 0.7rem 0 0;
      color: var(--muted);
      line-height: 1.75;
    }

    .doc-section ul,
    .doc-section ol {
      display: grid;
      gap: 0.6rem;
      margin: 1rem 0 0;
      padding-left: 1.35rem;
      color: var(--muted);
      line-height: 1.7;
    }

    .doc-section li::marker {
      color: var(--accent);
    }

    .meta-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 0.75rem;
      margin: 1.35rem 0 0;
    }

    .meta-item {
      min-width: 0;
      padding: 1rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
    }

    .meta-label {
      margin: 0;
      color: var(--muted);
      font-size: 0.76rem;
      font-weight: 800;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    .meta-value {
      margin: 0.35rem 0 0;
      color: var(--text);
      font-size: 1rem;
      font-weight: 760;
      line-height: 1.35;
    }

    .callout {
      margin: 1.2rem 0 0;
      padding: 1rem 1.1rem;
      border-left: 4px solid var(--accent);
      border-radius: var(--radius);
      background: color-mix(in srgb, var(--accent-soft) 70%, transparent);
      color: var(--text);
    }

    .callout strong {
      display: block;
      margin-bottom: 0.3rem;
    }

    .code-block {
      position: relative;
      overflow: hidden;
      margin: 1.25rem 0 0;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--code-bg);
      box-shadow: var(--shadow);
    }

    .code-caption {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: 0.75rem 1rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      color: #b6c4d9;
      font-size: 0.82rem;
      font-weight: 760;
    }

    pre {
      margin: 0;
      overflow: auto;
      padding: 1rem;
      color: var(--code-text);
      font-size: 0.9rem;
      line-height: 1.7;
      tab-size: 2;
    }

    code {
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
    }

    :not(pre) > code {
      border-radius: 6px;
      background: var(--surface-strong);
      color: var(--text);
      padding: 0.12rem 0.34rem;
      font-size: 0.9em;
    }

    .drive-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.65rem;
      margin: 1.25rem 0 0;
    }

    .project-links {
      margin: 1.35rem 0 0;
    }

    .project-links-label {
      margin: 0;
      color: var(--muted);
      font-size: 0.76rem;
      font-weight: 800;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    .project-links .drive-row {
      margin-top: 0.65rem;
    }

    .drive-button {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      min-height: 2.55rem;
      padding: 0 0.9rem;
      border: 1px solid color-mix(in srgb, var(--accent) 28%, var(--border));
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--accent-strong);
      font-weight: 760;
      text-decoration: none;
      transition: transform 150ms ease, border-color 150ms ease, background 150ms ease;
    }

    .drive-button svg,
    .icon-button svg,
    .text-button svg,
    .nav-toggle svg,
    .pager-button svg {
      width: 1rem;
      height: 1rem;
      flex: 0 0 auto;
      stroke-width: 2;
    }

    .pager {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.8rem;
      margin: 2rem 0 0;
    }

    .pager-button {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      min-height: 4.8rem;
      padding: 1rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      text-align: left;
      transition: transform 150ms ease, border-color 150ms ease, background 150ms ease;
    }

    .pager-button[disabled] {
      cursor: not-allowed;
      opacity: 0.45;
      transform: none;
    }

    .pager-button.next {
      justify-content: flex-end;
      text-align: right;
    }

    .pager-kicker {
      display: block;
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    .pager-title {
      display: block;
      margin-top: 0.18rem;
      font-weight: 760;
      line-height: 1.3;
    }

    .summary-panel {
      padding: 1rem;
      transition: opacity 180ms ease, transform 180ms ease;
    }

    .summary-panel.is-hidden {
      display: none;
    }

    .summary-section.is-hidden {
      display: none;
    }

    .summary-panel h2 {
      margin: 0;
      font-size: 1.12rem;
      line-height: 1.3;
    }

    .summary-panel p {
      margin: 0.8rem 0 0;
      color: var(--muted);
      line-height: 1.65;
    }

    .summary-points {
      display: grid;
      gap: 0.55rem;
      margin: 1rem 0 0;
      padding: 0;
      list-style: none;
    }

    .summary-points li {
      display: flex;
      gap: 0.5rem;
      color: var(--muted);
      line-height: 1.5;
    }

    .summary-points li::before {
      content: "";
      width: 0.42rem;
      height: 0.42rem;
      flex: 0 0 auto;
      margin-top: 0.48rem;
      border-radius: 99px;
      background: var(--success);
    }

    .mobile-backdrop {
      position: fixed;
      inset: var(--header-height) 0 0;
      z-index: 80;
      display: none;
      background: rgba(0, 0, 0, 0.38);
    }

    body.nav-open .mobile-backdrop {
      display: block;
    }

    @media (max-width: 1180px) {
      .layout {
        grid-template-columns: 250px minmax(0, 1fr);
      }

      .summary-panel {
        grid-column: 2;
        grid-row: 1;
        position: relative;
        top: auto;
        max-height: none;
      }

      .main {
        grid-column: 2;
        grid-row: 2;
      }
    }

    @media (max-width: 860px) {
      :root {
        --header-height: 66px;
      }

      .topbar-inner {
        padding: 0 0.85rem;
      }

      .brand-subtitle {
        display: none;
      }

      .nav-toggle {
        display: inline-flex;
      }

      .toolbar {
        gap: 0.4rem;
      }

      .text-button span {
        display: none;
      }

      .layout {
        display: block;
        padding: 1rem 0.85rem 2rem;
      }

      .sidebar {
        position: fixed;
        z-index: 90;
        top: var(--header-height);
        bottom: 0;
        left: 0;
        width: min(84vw, 320px);
        max-height: none;
        border-radius: 0;
        border-left: 0;
        transform: translateX(-105%);
        transition: transform 190ms ease;
      }

      body.nav-open .sidebar {
        transform: translateX(0);
      }

      .summary-panel {
        position: relative;
        top: auto;
        max-height: none;
        margin-bottom: 1.2rem;
      }

      .doc-header {
        padding-top: 0.2rem;
      }

      h1 {
        max-width: 11ch;
      }

      .meta-grid {
        grid-template-columns: 1fr;
      }

      .pager {
        grid-template-columns: 1fr;
      }

      .pager-button.next {
        justify-content: flex-start;
        text-align: left;
      }
    }

    @media (max-width: 560px) {
      .brand-title {
        max-width: 9.8rem;
      }

      .lang-switch button {
        min-width: 2.45rem;
      }

      .icon-button,
      .text-button,
      .nav-toggle {
        width: 2.25rem;
        min-height: 2.25rem;
      }

      .text-button {
        padding: 0;
      }

      .doc-section {
        padding: 1.65rem 0;
      }

      .drive-button {
        width: 100%;
        justify-content: center;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        scroll-behavior: auto !important;
        transition-duration: 0.01ms !important;
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
      }
    }

    /*
      Notion-inspired redesign layer.
      Content still comes from docs-content.js; this block only changes the visual system.
    */
    :root {
      color-scheme: light;
      --bg: #ffffff;
      --workspace: #f7f6f3;
      --surface: #ffffff;
      --surface-strong: #f1f1ef;
      --surface-hover: rgba(55, 53, 47, 0.06);
      --text: rgba(25, 23, 17, 0.95);
      --muted: #6f6a64;
      --subtle: #a39e98;
      --border: rgba(55, 53, 47, 0.12);
      --accent: #0075de;
      --accent-strong: #005bab;
      --accent-soft: #f2f9ff;
      --success: #0075de;
      --code-bg: #f7f6f3;
      --code-text: #31302e;
      --shadow: rgba(0, 0, 0, 0.04) 0 4px 18px, rgba(0, 0, 0, 0.027) 0 2px 8px, rgba(0, 0, 0, 0.02) 0 1px 3px;
      --radius: 5px;
      --header-height: 62px;
      --content-width: 760px;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    }

    [data-theme="dark"] {
      color-scheme: dark;
      --bg: #191918;
      --workspace: #20201f;
      --surface: #191918;
      --surface-strong: #262625;
      --surface-hover: rgba(255, 255, 255, 0.07);
      --text: rgba(255, 255, 255, 0.9);
      --muted: #b0aaa2;
      --subtle: #817a72;
      --border: rgba(255, 255, 255, 0.12);
      --accent: #62aef0;
      --accent-strong: #8ec7f6;
      --accent-soft: rgba(98, 174, 240, 0.12);
      --success: #62aef0;
      --code-bg: #242423;
      --code-text: rgba(255, 255, 255, 0.88);
      --shadow: none;
    }

    body {
      background: var(--bg);
      font-feature-settings: "lnum", "locl";
    }

    .topbar {
      min-height: var(--header-height);
      background: color-mix(in srgb, var(--surface) 94%, transparent);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(10px);
    }

    .topbar-inner {
      min-height: var(--header-height);
      max-width: none;
      padding: 0 1rem;
    }

    .brand {
      gap: 0.6rem;
    }

    .brand-mark {
      width: 2.15rem;
      height: 2.15rem;
      padding: 0;
      border: 0;
      border-radius: 0;
      background: transparent;
      color: var(--text);
      font-size: 0.78rem;
      font-weight: 700;
      box-shadow: none;
    }

    [data-theme="dark"] .brand-mark {
      background: transparent;
      box-shadow: none;
    }

    .brand-mark img {
      border-radius: 0;
      filter: brightness(0);
    }

    [data-theme="dark"] .brand-mark img {
      filter: none;
    }

    .brand-title {
      font-size: 0.94rem;
      font-weight: 600;
      letter-spacing: 0;
    }

    .brand-subtitle {
      color: var(--muted);
      font-size: 0.78rem;
      letter-spacing: 0;
    }

    .icon-button,
    .text-button,
    .nav-toggle {
      min-height: 2rem;
      border-color: transparent;
      border-radius: 4px;
      background: transparent;
      color: var(--muted);
    }

    .icon-button {
      width: 2rem;
    }

    .text-button {
      min-width: 2rem;
      padding: 0 0.55rem;
      font-size: 0.88rem;
      font-weight: 500;
    }

    .icon-button:hover,
    .text-button:hover,
    .nav-toggle:hover,
    .page-link:hover,
    .section-link:hover,
    .drive-button:hover,
    .pager-button:hover {
      transform: none;
      border-color: transparent;
      background: var(--surface-hover);
      color: var(--text);
    }

    .icon-button:focus-visible,

    /*

      --code-bg: #f6f5f2;
      --code-text: #282623;
      --shadow: rgba(0, 0, 0, 0.035) 0 6px 18px, rgba(0, 0, 0, 0.02) 0 2px 7px;
      --radius: 6px;
      --space-1: 0.25rem;

    .layout {

      padding: var(--top-offset) 36px 80px;

      width: var(--rail-fixed-width);

      border: 0;
      background: transparent;
      backdrop-filter: none;

      height: 44px;
      padding: 0;
      overflow: hidden;
      border: 0;

    .brand-mark img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
      opacity: 0.94;
      filter: brightness(0) saturate(100%);
      transition: filter 180ms ease, opacity 180ms ease;

    html[data-theme="dark"] .brand-mark img {
      filter: none;
    }

    .brand-copy {
      min-width: 0;
    }

    .brand-title {
      margin: 0;
      color: var(--text);
      font-family: var(--font-body);

      font-weight: 700;
      line-height: 1.25;
      letter-spacing: 0;
      overflow-wrap: anywhere;
      white-space: normal;

    .brand-subtitle {
      margin: 4px 0 0;
      color: var(--muted);
      font-family: var(--font-mono);
      font-size: 9px;
      line-height: 1.45;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      white-space: normal;
    }

    .toolbar {
      display: grid;
      grid-template-columns: 82px minmax(0, 1fr) 34px;
      gap: 6px;
      align-items: center;
      width: 100%;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }

    .lang-switch {
      grid-column: auto;
      display: flex;
      min-width: 0;
      min-height: 34px;
      overflow: hidden;
      padding: 0;
      border: 1px solid var(--border);
      background: transparent;
    }

    .lang-switch button {
      flex: 1;
      min-width: 0;
      min-height: 32px;
      padding: 0;
      border: 0;
      border-right: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-family: var(--font-mono);
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;

    .lang-switch button:last-child {
      border-right: 0;

    .lang-switch button:hover,

      color: var(--accent);
      background: var(--accent-soft);

    .nav-toggle,
    .icon-button,
    .text-button {

      justify-content: center;
      min-height: 34px;

      background: transparent;
      color: var(--muted-hi);
      transition: color 140ms ease, background 140ms ease, border-color 140ms ease, transform 140ms ease;

    .nav-toggle {

      width: 42px;
      padding: 0;
    }

    .icon-button {
      width: 34px;
      padding: 0;

    .text-button {

      min-width: 0;

      max-width: 100%;

      font-family: var(--font-body);

    /*
      Stability overrides for the current compact documentation UI.

    .doc-page.is-page-entering {

    @keyframes docPageEnter {
      from {
        opacity: 0;
        transform: translate3d(var(--page-enter-x), 8px, 0);

      to {
        opacity: 1;
        transform: translate3d(0, 0, 0);

    .doc-page.is-page-entering .summary-section,
    .doc-page.is-page-entering .doc-section {
      animation: docPageContentEnter 320ms cubic-bezier(0.16, 1, 0.3, 1) both;

    .doc-page.is-page-entering .summary-section,
    .doc-page.is-page-entering .doc-section {

    @keyframes docPageContentEnter {

      to {

  <!--

  <!-- Edit docs-content.js to change documentation content. Keep this HTML file focused on layout and behavior. -->
  <script src="docs-content.js"></script>
  <script>
    const DOC_DATA = window.DOC_DATA;

    const storageKey = (name) => `${DOC_DATA.settings.storagePrefix}:${name}`;

      } catch (error) {

      }
    }

    function writePreference(name, value) {
      try {

    function normalizeLanguage(lang) {
      const fallback = DOC_DATA.settings.defaultLanguage || "en";

      return theme === "dark" || theme === "light" ? theme : (DOC_DATA.settings.defaultTheme || "light");
    }

    const state = {
      lang: normalizeLanguage(readPreference("language", DOC_DATA.settings.defaultLanguage)),
      theme: normalizeTheme(readPreference("theme", DOC_DATA.settings.defaultTheme)),
      currentPageIndex: 0,
      navPageIndex: 0,
      expandedNavPages: new Set([0]),

    const swipeState = {
      startX: 0,

      startTime: 0,
      tracking: false
    };

    const elements = {
      html: document.documentElement,
      body: document.body,
      brandMark: document.getElementById("brandMark"),
      brandTitle: document.getElementById("brandTitle"),
      brandSubtitle: document.getElementById("brandSubtitle"),
      pageNav: document.getElementById("pageNav"),
      sectionNav: document.getElementById("sectionNav"),
      main: document.getElementById("main"),
      docPage: document.getElementById("docPage"),
      pager: document.getElementById("pager"),
      summaryPanel: document.getElementById("summaryPanel"),
      fixedProjectLinks: document.getElementById("fixedProjectLinks"),
      sidebarProjectLinks: document.getElementById("sidebarProjectLinks"),
      summaryToggle: document.getElementById("summaryToggle"),
      themeToggle: document.getElementById("themeToggle"),
      themeIcon: document.getElementById("themeIcon"),
      navToggle: document.getElementById("navToggle"),
      mobileBackdrop: document.getElementById("mobileBackdrop")
    };

    const icons = {
      folder: `<svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 7.5A2.5 2.5 0 0 1 5.5 5H10l2 2h6.5A2.5 2.5 0 0 1 21 9.5v7A2.5 2.5 0 0 1 18.5 19h-13A2.5 2.5 0 0 1 3 16.5Z"/><path d="M3 10h18"/></svg>`,
      tracker: `<svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M8 4h8"/><path d="M9 2h6a2 2 0 0 1 2 2v1H7V4a2 2 0 0 1 2-2Z"/><path d="M7 5H6a2 2 0 0 0-2 2v13h16V7a2 2 0 0 0-2-2h-1"/><path d="m8 12 1.5 1.5L12 11"/><path d="M14 12h3"/><path d="m8 17 1.5 1.5L12 16"/><path d="M14 17h3"/></svg>`,
      floorPlan: `<svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M4 4h16v16H4Z"/><path d="M9 4v6"/><path d="M9 14v6"/><path d="M4 10h8"/><path d="M12 10v10"/><path d="M12 14h8"/><path d="M16 4v6"/></svg>`,
      external: `<svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M14 4h6v6"/><path d="M10 14 20 4"/><path d="M20 14v4a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h4"/></svg>`,
      chevronDown: `<svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="m6 9 6 6 6-6"/></svg>`,
      previous: `<svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>`,
      next: `<svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M5 12h14"/><path d="M12 5l7 7-7 7"/></svg>`,
      sun: `<path d="M12 3v2M12 19v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M3 12h2M19 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" /><circle cx="12" cy="12" r="4" />`,
      moon: `<path d="M21 14.5A8.5 8.5 0 1 1 9.5 3 6.5 6.5 0 0 0 21 14.5Z" />`
    };

    function iconFor(name) {
      return icons[name] || icons.external;
    }

    function t(key) {
      const localized = DOC_DATA.ui?.[state.lang] || DOC_DATA.ui?.en || {};
      const fallback = DOC_DATA.ui?.en || {};
      return localized[key] || fallback[key] || key;
    }

    function pageContent(page = DOC_DATA.pages[state.currentPageIndex]) {
      const localized = page?.[state.lang];
      return localized && typeof localized === "object" ? localized : page?.en || {};
    }

    function escapeHTML(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function slugFor(pageId, sectionId) {
      return `${pageId}-${sectionId}`;
    }

    function navigationLabel(value) {
      return String(value || "").replace(/^\s*\d+(?:\.\d+)*(?:\s*[-\u2013\u2014]\s*\d+(?:\.\d+)*)?\.?\s+/, "");
    }

    function setTheme(theme) {
      state.theme = normalizeTheme(theme);
      elements.html.dataset.theme = state.theme;
      writePreference("theme", state.theme);
      const nextThemeLabel = state.theme === "dark" ? t("themeLight") : t("themeDark");
      elements.themeToggle.setAttribute("aria-label", nextThemeLabel);
      elements.themeToggle.setAttribute("title", nextThemeLabel);
      elements.themeIcon.innerHTML = state.theme === "dark" ? icons.moon : icons.sun;
    }

    function setLanguage(lang) {
      state.lang = normalizeLanguage(lang);
      elements.html.lang = state.lang;
      writePreference("language", state.lang);
      document.querySelectorAll("[data-lang]").forEach((button) => {
        button.setAttribute("aria-pressed", String(button.dataset.lang === state.lang));
      });
      render();
    }

    function renderStaticText() {
      renderBrandMark();
      elements.brandTitle.textContent = DOC_DATA.settings.brandTitle || t("brandTitle");
      elements.brandSubtitle.textContent = DOC_DATA.settings.brandSubtitle || t("brandSubtitle");
      elements.navToggle.setAttribute("aria-label", t("menu"));
      elements.navToggle.setAttribute("title", t("menu"));
      document.querySelectorAll("[data-i18n-ui]").forEach((node) => {
        node.textContent = t(node.dataset.i18nUi);
      });
      setTheme(state.theme);
      updateSummaryToggleLabel();
    }

    function renderBrandMark() {
      const logoPath = DOC_DATA.settings.brandLogo;
      elements.brandMark.textContent = "";

      if (!logoPath) {
        elements.brandMark.textContent = DOC_DATA.settings.brandMark || "";
        return;
      }

      const logo = document.createElement("img");
      logo.src = logoPath;
      logo.alt = "";
      logo.decoding = "async";
      logo.loading = "eager";
      logo.addEventListener("error", () => {
        elements.brandMark.textContent = DOC_DATA.settings.brandMark || "";
      });
      elements.brandMark.appendChild(logo);
    }

    function renderPageNav() {
      elements.pageNav.innerHTML = DOC_DATA.pages.map((page, index) => {
        const content = pageContent(page);
        const sections = getContentSections(content);
        const label = navigationLabel(content.navTitle || content.title);
        const expanded = state.expandedNavPages.has(index);
        const current = index === state.currentPageIndex;
        const currentSectionId = activeSectionId();
        const dropdownId = `navDropdown-${index}`;
        const navSections = sections.length ? sections : [{ id: "page-summary", heading: t("pageSummarySectionTitle") }];
        const subpages = navSections.map((section) => {
          const sectionLabel = navigationLabel(section.heading);
          const active = current && section.id === currentSectionId;
          return `<button class="section-link ${active ? "is-active" : ""}" type="button" data-page-index="${index}" data-section-id="${section.id}" aria-current="${active ? "true" : "false"}" title="${escapeHTML(sectionLabel)}">${escapeHTML(sectionLabel)}</button>`;
        }).join("");

        return `
          <div class="nav-group ${expanded ? "is-expanded" : ""}" data-nav-group="${index}">
            <button class="page-link ${expanded ? "is-open" : ""} ${current ? "is-active is-current-page" : ""}" type="button" data-nav-page-index="${index}" aria-current="${current ? "page" : "false"}" aria-expanded="${expanded ? "true" : "false"}" aria-controls="${dropdownId}" title="${escapeHTML(label)}">
              <span class="nav-label">${escapeHTML(label)}</span>
              <span class="nav-chevron">${icons.chevronDown}</span>
            </button>
            <div class="nav-dropdown" id="${dropdownId}" aria-hidden="${expanded ? "false" : "true"}">
              <div class="nav-dropdown-inner">${subpages}</div>
            </div>
          </div>
        `;
      }).join("");

      elements.pageNav.querySelectorAll("[data-nav-page-index]").forEach((button) => {
        button.addEventListener("click", () => {
          selectNavPage(Number(button.dataset.navPageIndex));
        });
      });

      elements.pageNav.querySelectorAll("[data-section-id]").forEach((button) => {
        button.addEventListener("click", () => {
          goToSectionPage(button.dataset.sectionId, Number(button.dataset.pageIndex));
        });
      });
    }

    function renderSectionNav() {
      const navPageIndex = state.navPageIndex;
      const current = pageContent(DOC_DATA.pages[navPageIndex]);
      const sections = getContentSections(current);
      const currentSectionId = activeSectionId();
      const showingCurrentPage = navPageIndex === state.currentPageIndex;
      const navSections = sections.length ? sections : [{ id: "page-summary", heading: t("pageSummarySectionTitle") }];
      elements.sectionNav.innerHTML = navSections.map((section, index) => {
        const active = showingCurrentPage && section.id === currentSectionId;
        const label = navigationLabel(section.heading);
        return `<button class="section-link ${active ? "is-active" : ""}" type="button" data-page-index="${navPageIndex}" data-section-id="${section.id}" aria-current="${active ? "true" : "false"}" title="${escapeHTML(label)}">${escapeHTML(label)}</button>`;
      }).join("");

      elements.sectionNav.querySelectorAll("[data-section-id]").forEach((button) => {
        button.addEventListener("click", () => {
          goToSectionPage(button.dataset.sectionId, Number(button.dataset.pageIndex));
        });
      });
    }

    function renderMeta(meta = []) {
      if (!meta.length) return "";
      const columns = Math.min(Math.max(meta.length, 1), 3);
      return `<div class="meta-grid meta-columns-${columns}" style="--meta-columns: ${columns}">${meta.map((item) => `
        <div class="meta-item">
          <p class="meta-label">${escapeHTML(item.label ?? "")}</p>
          <p class="meta-value">${escapeHTML(item.value ?? "")}</p>
        </div>
      `).join("")}</div>`;
    }

    function renderCallout(callout) {
      if (!callout) return "";
      return `<div class="callout"><strong>${escapeHTML(callout.title)}</strong>${escapeHTML(callout.text)}</div>`;
    }

    function renderList(items = [], ordered = false) {
      if (!items.length) return "";
      const tag = ordered ? "ol" : "ul";
      return `<${tag}>${items.map((item) => `<li>${escapeHTML(item)}</li>`).join("")}</${tag}>`;
    }

    function renderCode(code) {
      if (!code) return "";
      return `
        <div class="code-block">
          <div class="code-caption">
            <span>${escapeHTML(code.caption || code.language || "Code")}</span>
            <span>${escapeHTML(code.language || "")}</span>
          </div>
          <pre><code>${escapeHTML(code.value)}</code></pre>
        </div>
      `;
    }

    function tableColumns(table) {
      return Array.isArray(table?.columns) ? table.columns : [];
    }

    function tableRows(table) {
      return Array.isArray(table?.rows) ? table.rows : [];
    }

    function renderTable(table) {
      const columns = tableColumns(table);
      const rows = tableRows(table);
      if (!columns.length || !rows.length) return "";

      return `
        <div class="table-wrap" role="region" aria-label="${escapeHTML(table.caption || "Data table")}" tabindex="0">
          <table class="doc-table">
            ${table.caption ? `<caption>${escapeHTML(table.caption)}</caption>` : ""}
            <thead>
              <tr>${columns.map((column) => `<th scope="col">${escapeHTML(column)}</th>`).join("")}</tr>
            </thead>
            <tbody>
              ${rows.map((row) => {
                const cells = Array.isArray(row)
                  ? columns.map((_, index) => row[index] ?? "")
                  : columns.map((column) => row?.[column] ?? row?.[String(column).toLowerCase().replace(/\s+/g, "")] ?? "");
                return `<tr>${cells.map((cell) => `<td>${escapeHTML(cell)}</td>`).join("")}</tr>`;
              }).join("")}
            </tbody>
          </table>
        </div>
      `;
    }

    function requirementFor(paragraph) {
      const text = String(paragraph || "");
      const patterns = [
        { prefix: "Builder requirements:", role: "builder" },
        { prefix: "Developer requirements:", role: "developer" },
        { prefix: "Kebutuhan builder:", role: "builder" },
        { prefix: "Kebutuhan developer:", role: "developer" }
      ];
      const match = patterns.find((item) => text.toLowerCase().startsWith(item.prefix.toLowerCase()));
      if (!match) return null;

      return {
        role: match.role,
        label: match.prefix.slice(0, -1),
        text: text.slice(match.prefix.length).trim()
      };
    }

    function renderParagraph(paragraph) {
      const requirement = requirementFor(paragraph);
      if (!requirement) {
        return `<p>${escapeHTML(paragraph)}</p>`;
      }

      return `
        <div class="requirement-panel requirement-panel--${requirement.role}" role="note" aria-label="${escapeHTML(requirement.label)}">
          <div class="requirement-label">${escapeHTML(requirement.label)}</div>
          <p>${escapeHTML(requirement.text)}</p>
        </div>
      `;
    }

    function localizedValue(value) {
      if (typeof value === "string") return value;
      if (!value || typeof value !== "object") return "";
      return value[state.lang] || value.en || Object.values(value)[0] || "";
    }

    let projectLinkWarningShown = false;

    function projectLinkNeedsUrl(url = "") {
      return !url || /replace-development-folder|replace-tracker|replace-floor-plan/i.test(url);
    }

    function warnAboutMissingProjectLinks(buttons = DOC_DATA.projectLinks || []) {
      if (DOC_DATA.settings.showProjectLinkWarnings === false) return;

      const missingLabels = buttons
        .filter((button) => projectLinkNeedsUrl(button.url))
        .map((button) => localizedValue(button.label));

      if (!missingLabels.length) return;
      if (projectLinkWarningShown) return;
      projectLinkWarningShown = true;

      console.warn(
        `Project link URLs still need input before generating this document: ${missingLabels.join(", ")}. ` +
        "Ask the user for these links and update DOC_DATA.projectLinks[].url in the content file."
      );
    }

    let docDataValidationShown = false;

    function validateSectionBlocks(section, context, warnings) {
      const supportedKeys = new Set(["id", "heading", "body", "list", "steps", "callout", "code", "table", "hidden"]);
      Object.keys(section || {}).forEach((key) => {
        if (!supportedKeys.has(key)) {
          warnings.push(`${context} uses unsupported section key "${key}". Supported blocks are body, list, steps, callout, code, and table.`);
        }
      });

      if (section.table) {
        if (!Array.isArray(section.table.columns) || !section.table.columns.length) {
          warnings.push(`${context} has a table without columns.`);
        }
        if (!Array.isArray(section.table.rows) || !section.table.rows.length) {
          warnings.push(`${context} has a table without rows.`);
        }
      }
    }

    function validateLanguageContent(page, lang, pageIndex, errors, warnings) {
      const content = page?.[lang];
      const label = `DOC_DATA.pages[${pageIndex}].${lang}`;

      if (!content || typeof content !== "object") {
        errors.push(`${label} is missing or is not an object.`);
        return [];
      }

      if (!content.title) {
        errors.push(`${label}.title is required.`);
      }

      if (!content.navTitle && !content.title) {
        errors.push(`${label} needs navTitle or title for navigation.`);
      }

      if (!content.lead) {
        warnings.push(`${label}.lead is empty. Add a short page introduction before delivery.`);
      }

      if (summaryNeedsGeneration(content.summary)) {
        warnings.push(`${label}.summary is missing or still set to auto. Generate an edited summary object before client delivery.`);
      } else if (typeof content.summary === "object") {
        if (!content.summary.title || !content.summary.body || !Array.isArray(content.summary.points) || !content.summary.points.length) {
          warnings.push(`${label}.summary should include title, body, and non-empty points.`);
        }
      }

      if (!Array.isArray(content.sections) || !content.sections.length) {
        warnings.push(`${label}.sections is empty. Add at least one visible section so dropdown navigation and pagination are useful.`);
        return [];
      }

      const ids = new Set();
      content.sections.forEach((section, sectionIndex) => {
        const sectionLabel = `${label}.sections[${sectionIndex}]`;
        if (!section.id) {
          errors.push(`${sectionLabel}.id is required.`);
        } else if (ids.has(section.id)) {
          errors.push(`${sectionLabel}.id "${section.id}" is duplicated within the page.`);
        } else {
          ids.add(section.id);
        }

        if (!section.heading) {
          warnings.push(`${sectionLabel}.heading is empty.`);
        }

        validateSectionBlocks(section, sectionLabel, warnings);
      });

      return content.sections.map((section) => section.id);
    }

    function validateDocData() {
      if (docDataValidationShown) return;
      docDataValidationShown = true;

      const errors = [];
      const warnings = [];
      const pages = Array.isArray(DOC_DATA.pages) ? DOC_DATA.pages : [];

      if (!pages.length) {
        errors.push("DOC_DATA.pages must contain at least one page.");
      }

      const slugs = new Set();
      pages.forEach((page, pageIndex) => {
        if (!page.slug) {
          errors.push(`DOC_DATA.pages[${pageIndex}].slug is required.`);
        } else if (slugs.has(page.slug)) {
          errors.push(`DOC_DATA.pages[${pageIndex}].slug "${page.slug}" is duplicated.`);
        } else {
          slugs.add(page.slug);
        }

        const enIds = validateLanguageContent(page, "en", pageIndex, errors, warnings);
        const idIds = validateLanguageContent(page, "id", pageIndex, errors, warnings);
        if (enIds.length && idIds.length && enIds.join("|") !== idIds.join("|")) {
          warnings.push(`DOC_DATA.pages[${pageIndex}] has mismatched en/id section ids. Keep section ids identical and in the same order.`);
        }
      });

      const projectLinks = Array.isArray(DOC_DATA.projectLinks) ? DOC_DATA.projectLinks : [];
      if (projectLinks.length !== 3) {
        warnings.push("DOC_DATA.projectLinks should contain exactly three buttons: Development Folder, Tracker, and Floor Plan.");
      }

      const missingProjectLinks = projectLinks
        .filter((button) => projectLinkNeedsUrl(button.url))
        .map((button) => localizedValue(button.label) || "Unnamed project link");
      if (missingProjectLinks.length) {
        warnings.push(`Replace placeholder Google Drive URLs before delivery: ${missingProjectLinks.join(", ")}.`);
      }

      if (errors.length) {
        console.error("Documentation data validation failed:", errors);
      }

      if (warnings.length) {
        console.warn("Documentation data validation warnings:", warnings);
      }
    }

    function renderProjectLinks(buttons = DOC_DATA.projectLinks || []) {
      if (!buttons.length) return "";
      warnAboutMissingProjectLinks(buttons);
      return `
        <div class="project-links" aria-label="${escapeHTML(t("projectLinksLabel"))}">
          <p class="project-links-label">${escapeHTML(t("projectLinksLabel"))}</p>
          <div class="drive-row">${buttons.map((button) => {
            const label = localizedValue(button.label);
            const primaryClass = button.primary ? " is-primary" : "";
            return `
        <a class="drive-button${primaryClass}" href="${escapeHTML(button.url)}" target="_blank" rel="noopener noreferrer" aria-label="${escapeHTML(`${label}. ${t("openDrive")}`)}">
          ${iconFor(button.icon)}
          <span>${escapeHTML(label)}</span>
          <span class="external-icon" aria-hidden="true">${icons.external}</span>
        </a>
      `;
          }).join("")}</div>
        </div>
      `;
    }

    function renderSidebarProjectLinks() {
      const html = renderProjectLinks();
      if (elements.fixedProjectLinks) {
        elements.fixedProjectLinks.innerHTML = html;
      }
      if (elements.sidebarProjectLinks) {
        elements.sidebarProjectLinks.innerHTML = html;
      }
    }

    function getContentSections(page = pageContent()) {
      return (Array.isArray(page.sections) ? page.sections : []).filter((section) => section.id !== "page-summary" && !section.hidden);
    }

    function textFrom(value) {
      if (Array.isArray(value)) return value.map(textFrom).filter(Boolean).join(" ");
      if (typeof value === "string") return value;
      if (!value || typeof value !== "object") return "";
      return textFrom(value.text || value.body || value.value || "");
    }

    function compactText(value, maxLength = 150) {
      const text = textFrom(value).replace(/\s+/g, " ").trim();
      if (text.length <= maxLength) return text;
      const sliced = text.slice(0, maxLength).replace(/\s+\S*$/, "").trim();
      return `${sliced}...`;
    }

    function firstSentence(value, maxLength = 150) {
      const text = textFrom(value).replace(/\s+/g, " ").trim();
      const sentence = text.match(/^.*?[.!?](?:\s|$)/);
      return compactText(sentence ? sentence[0] : text, maxLength);
    }

    function summaryNeedsGeneration(summary) {
      return !summary || summary === "auto" || summary.auto === true;
    }

    function generatedSummaryPoint(section) {
      const heading = navigationLabel(section.heading || "");
      const source = section.body?.[0] || section.list?.[0] || section.steps?.[0] || section.callout?.text || "";
      const detail = firstSentence(source, 126);

      if (heading && detail) return `${heading}: ${detail}`;
      return heading || detail;
    }

    function generatedSummaryForPage(page = pageContent()) {
      const title = navigationLabel(page.title || page.navTitle || t("pageSummarySectionTitle"));
      const sections = getContentSections(page);
      const sectionNames = sections.map((section) => navigationLabel(section.heading)).filter(Boolean);
      const generatedTitle = state.lang === "id" ? `Ringkasan ${title}` : `${title} summary`;
      const fallbackBody = sectionNames.length
        ? `${state.lang === "id" ? "Page ini mencakup" : "This page covers"} ${sectionNames.slice(0, 3).join(", ")}.`
        : `${state.lang === "id" ? "Page ini merangkum content utama untuk membantu production review." : "This page summarizes the main content for production review."}`;

      const points = sections
        .map(generatedSummaryPoint)
        .filter(Boolean)
        .slice(0, 3);

      while (points.length < 3 && sectionNames[points.length]) {
        points.push(sectionNames[points.length]);
      }

      return {
        title: generatedTitle,
        body: compactText(page.lead || fallbackBody, 230),
        points: points.length ? points : [fallbackBody]
      };
    }

    function summaryForPage(page = pageContent()) {
      const summary = page.summary;
      const generated = generatedSummaryForPage(page);

      if (summaryNeedsGeneration(summary) || typeof summary !== "object") {
        return generated;
      }

      return {
        title: summary.title || generated.title,
        body: summary.body || generated.body,
        points: Array.isArray(summary.points) && summary.points.length ? summary.points : generated.points
      };
    }

    function getPageSections(page = pageContent()) {
      return [
        {
          id: "page-summary",
          heading: t("pageSummarySectionTitle")
        },
        ...getContentSections(page)
      ];
    }

    function pageSectionsForIndex(pageIndex) {
      const page = DOC_DATA.pages[pageIndex];
      return page ? getPageSections(pageContent(page)) : [];
    }

    function contentSectionsForIndex(pageIndex) {
      const page = DOC_DATA.pages[pageIndex];
      return page ? getContentSections(pageContent(page)) : [];
    }

    function defaultSectionId(pageIndex = state.currentPageIndex) {
      const sections = contentSectionsForIndex(pageIndex);
      return sections[0] ? sections[0].id : "page-summary";
    }

    function normalizeSectionId(pageIndex = state.currentPageIndex, sectionId = state.activeSectionId) {
      const sections = contentSectionsForIndex(pageIndex);
      const fallback = defaultSectionId(pageIndex);
      return sections.some((section) => section.id === sectionId) ? sectionId : fallback;
    }

    function activeSectionId() {
      const normalized = normalizeSectionId();
      if (normalized !== state.activeSectionId) {
        state.activeSectionId = normalized;
      }
      return normalized;
    }

    function pageLocations() {
      return DOC_DATA.pages.flatMap((page, pageIndex) => {
        const content = pageContent(page);
        const pageLabel = navigationLabel(content.navTitle || content.title);
        const sections = contentSectionsForIndex(pageIndex);
        if (!sections.length) {
          return [{
            pageIndex,
            sectionId: "page-summary",
            label: t("pageSummarySectionTitle"),
            pageLabel
          }];
        }
        return sections.map((section) => ({
          pageIndex,
          sectionId: section.id,
          label: navigationLabel(section.heading),
          pageLabel
        }));
      });
    }

    function pagerLabel(location) {
      if (!location) return "";
      return location.pageLabel && location.pageLabel !== location.label
        ? `${location.pageLabel} / ${location.label}`
        : location.label;
    }

    function currentLocationIndex(locations = pageLocations()) {
      const currentSectionId = activeSectionId();
      return locations.findIndex((location) => (
        location.pageIndex === state.currentPageIndex &&
        location.sectionId === currentSectionId
      ));
    }

    function renderSummaryMount() {
      return `<aside class="summary-panel" id="summaryPanel" aria-live="polite"></aside>`;
    }

    function renderSummarySection() {
      const pageId = DOC_DATA.pages[state.currentPageIndex].slug;
      return `
        <section class="doc-section summary-section" id="${slugFor(pageId, "page-summary")}" data-section-id="page-summary">
          <h2>${escapeHTML(t("pageSummarySectionTitle"))}</h2>
          ${renderSummaryMount()}
        </section>
      `;
    }

    function renderSection(section) {
      const pageId = DOC_DATA.pages[state.currentPageIndex].slug;
      return `
        <section class="doc-section" id="${slugFor(pageId, section.id)}" data-section-id="${section.id}">
          <h2>${escapeHTML(navigationLabel(section.heading))}</h2>
          ${(section.body || []).map(renderParagraph).join("")}
          ${renderList(section.list)}
          ${renderList(section.steps, true)}
          ${renderCallout(section.callout)}
          ${renderCode(section.code)}
          ${renderTable(section.table)}
        </section>
      `;
    }

    function renderSubpage(current) {
      const currentSectionId = activeSectionId();
      if (currentSectionId === "page-summary") {
        return renderSummarySection();
      }

      const section = getContentSections(current).find((item) => item.id === currentSectionId);
      if (!section) {
        return renderSummarySection();
      }

      return `
        ${renderSummarySection()}
        ${renderSection(section)}
      `;
    }

    function renderDocPage() {
      const current = pageContent();
      const canAnimate = state.hasRenderedDocPage && !window.matchMedia("(prefers-reduced-motion: reduce)").matches;
      elements.docPage.classList.remove("is-page-entering");
      elements.docPage.dataset.motionDirection = state.pageMotionDirection || "neutral";
      elements.docPage.innerHTML = `
        <header class="doc-header">
          ${current.eyebrow ? `<p class="eyebrow">${escapeHTML(current.eyebrow)}</p>` : ""}
          <h1>${escapeHTML(navigationLabel(current.title))}</h1>
          <p class="lead">${escapeHTML(current.lead || "")}</p>
          ${renderMeta(current.meta)}
        </header>
        ${renderSubpage(current)}
      `;
      if (canAnimate) {
        void elements.docPage.offsetWidth;
        elements.docPage.classList.add("is-page-entering");
      }
      state.hasRenderedDocPage = true;
      state.pageMotionDirection = "neutral";
    }

    function renderSummary() {
      const summaryPanel = document.getElementById("summaryPanel");
      const summarySection = summaryPanel ? summaryPanel.closest(".summary-section") : null;
      elements.summaryPanel = summaryPanel;
      if (!summaryPanel) return;

      const summary = summaryForPage(pageContent());
      if (summarySection) {
        summarySection.classList.toggle("is-hidden", !state.summaryVisible);
        elements.summaryToggle.setAttribute("aria-controls", summarySection.id);
      }
      summaryPanel.innerHTML = `
        <h2>${escapeHTML(summary.title)}</h2>
        <p>${escapeHTML(summary.body)}</p>
        <ul class="summary-points">
          ${(summary.points || []).map((point) => `<li>${escapeHTML(point)}</li>`).join("")}
        </ul>
      `;
    }

    function renderPager() {
      const locations = pageLocations();
      const currentIndex = currentLocationIndex(locations);
      const previousLocation = locations[currentIndex - 1];
      const nextLocation = locations[currentIndex + 1];
      const previousLabel = pagerLabel(previousLocation);
      const nextLabel = pagerLabel(nextLocation);

      elements.pager.innerHTML = `
        <button class="pager-button previous" type="button" data-page-index="${previousLocation ? previousLocation.pageIndex : -1}" data-section-id="${previousLocation ? previousLocation.sectionId : ""}" ${previousLocation ? "" : "disabled"} aria-label="${escapeHTML(previousLocation ? `${t("previous")}: ${previousLabel}` : t("firstPage"))}">
          ${icons.previous}
          <span>
            <span class="pager-kicker">${escapeHTML(t("previous"))}</span>
            <span class="pager-title">${escapeHTML(previousLocation ? previousLocation.label : t("firstPage"))}</span>
          </span>
        </button>
        <button class="pager-button next" type="button" data-page-index="${nextLocation ? nextLocation.pageIndex : -1}" data-section-id="${nextLocation ? nextLocation.sectionId : ""}" ${nextLocation ? "" : "disabled"} aria-label="${escapeHTML(nextLocation ? `${t("next")}: ${nextLabel}` : t("lastPage"))}">
          <span>
            <span class="pager-kicker">${escapeHTML(t("next"))}</span>
            <span class="pager-title">${escapeHTML(nextLocation ? nextLocation.label : t("lastPage"))}</span>
          </span>
          ${icons.next}
        </button>
      `;
    }

    function updateSummaryToggleLabel() {
      const labelKey = state.summaryVisible ? "summaryToggleHide" : "summaryToggleShow";
      const label = t(labelKey);
      const text = elements.summaryToggle.querySelector("span");
      if (text) text.textContent = label;
      elements.summaryToggle.setAttribute("aria-expanded", String(state.summaryVisible));
      elements.summaryToggle.setAttribute("aria-label", label);
      elements.summaryToggle.setAttribute("title", label);
    }

    function closeMobileNav() {
      elements.body.classList.remove("nav-open");
      elements.navToggle.setAttribute("aria-expanded", "false");
    }

    function shouldIgnorePageArrow(event) {
      if (event.altKey || event.ctrlKey || event.metaKey || event.shiftKey) return true;
      if (elements.body.classList.contains("nav-open")) return true;
      const target = event.target;
      if (!(target instanceof Element)) return false;
      return Boolean(target.closest("input, textarea, select, [contenteditable='true']"));
    }

    function shouldIgnoreSwipe(target) {
      if (!(target instanceof Element)) return true;
      if (!window.matchMedia("(max-width: 960px)").matches) return true;
      if (elements.body.classList.contains("nav-open")) return true;
      return Boolean(target.closest("input, textarea, select, button, a, pre, code, .code-block, .table-wrap, .doc-table, .pager, [contenteditable='true'], [role='button']"));
    }

    function handleSwipeStart(event) {
      if (event.touches.length !== 1 || shouldIgnoreSwipe(event.target)) {
        swipeState.tracking = false;
        return;
      }

      const touch = event.touches[0];
      swipeState.startX = touch.clientX;
      swipeState.startY = touch.clientY;
      swipeState.startTime = Date.now();
      swipeState.tracking = true;
    }

    function handleSwipeEnd(event) {
      if (!swipeState.tracking || !event.changedTouches.length) return;
      swipeState.tracking = false;

      const touch = event.changedTouches[0];
      const deltaX = touch.clientX - swipeState.startX;
      const deltaY = touch.clientY - swipeState.startY;
      const elapsed = Date.now() - swipeState.startTime;
      const absX = Math.abs(deltaX);
      const absY = Math.abs(deltaY);
      const minSwipeDistance = Math.min(124, Math.max(56, window.innerWidth * 0.16));
      const mostlyHorizontal = absX > absY * 1.25;
      const controlledVerticalDrift = absY < Math.max(72, absX * 0.8);
      const quickEnough = elapsed < 950;

      if (!quickEnough || !mostlyHorizontal || !controlledVerticalDrift || absX < minSwipeDistance) return;

      const navigated = goToAdjacentPage(deltaX < 0 ? 1 : -1);
      if (navigated) event.preventDefault();
    }

    function goToAdjacentPage(direction) {
      const locations = pageLocations();
      const currentIndex = currentLocationIndex(locations);
      const target = locations[currentIndex + direction];
      if (!target) return false;
      goToLocation(target.pageIndex, target.sectionId);
      return true;
    }

    function goToLocation(pageIndex, sectionId = defaultSectionId(pageIndex), focusMain = true) {
      if (pageIndex < 0 || pageIndex >= DOC_DATA.pages.length) return;
      const targetSectionId = normalizeSectionId(pageIndex, sectionId);
      const locations = pageLocations();
      const currentIndex = currentLocationIndex(locations);
      const targetIndex = locations.findIndex((location) => {
        return location.pageIndex === pageIndex && location.sectionId === targetSectionId;
      });
      if (targetIndex > currentIndex) {
        state.pageMotionDirection = "forward";
      } else if (targetIndex < currentIndex) {
        state.pageMotionDirection = "backward";
      } else {
        state.pageMotionDirection = "neutral";
      }
      state.currentPageIndex = pageIndex;
      state.navPageIndex = pageIndex;
      state.expandedNavPages.add(pageIndex);
      state.activeSectionId = targetSectionId;
      closeMobileNav();
      render();
      if (focusMain) elements.docPage.focus?.({ preventScroll: true });
      window.scrollTo({ top: 0, behavior: "auto" });
    }

    function updateNavDropdownState() {
      elements.pageNav.querySelectorAll("[data-nav-group]").forEach((group) => {
        const index = Number(group.dataset.navGroup);
        const expanded = state.expandedNavPages.has(index);
        const pageButton = group.querySelector("[data-nav-page-index]");
        const dropdown = group.querySelector(".nav-dropdown");
        group.classList.toggle("is-expanded", expanded);
        if (pageButton) {
          pageButton.classList.toggle("is-open", expanded);
          pageButton.setAttribute("aria-expanded", String(expanded));
        }
        if (dropdown) {
          dropdown.setAttribute("aria-hidden", String(!expanded));
        }
      });
    }

    function selectNavPage(index) {
      if (index < 0 || index >= DOC_DATA.pages.length) return;
      state.navPageIndex = index;
      if (state.expandedNavPages.has(index)) {
        state.expandedNavPages.delete(index);
      } else {
        state.expandedNavPages.add(index);
      }
      updateNavDropdownState();
      renderSectionNav();
    }

    function goToPage(index, focusMain = true) {
      if (index < 0 || index >= DOC_DATA.pages.length) return;
      goToLocation(index, defaultSectionId(index), focusMain);
    }

    function goToSectionPage(sectionId, pageIndex = state.navPageIndex, focusMain = true) {
      goToLocation(pageIndex, sectionId, focusMain);
    }

    function observeSections() {
      if (window.sectionObserver) {
        window.sectionObserver.disconnect();
      }
      if (window.sectionScrollHandler) {
        window.removeEventListener("scroll", window.sectionScrollHandler);
      }
      window.sectionScrollHandler = null;
    }

    function render() {
      renderStaticText();
      renderSidebarProjectLinks();
      renderPageNav();
      renderSectionNav();
      renderDocPage();
      renderSummary();
      renderPager();
      observeSections();
    }

    elements.pager.addEventListener("click", (event) => {
      const button = event.target.closest("[data-page-index]");
      if (!button || button.disabled) return;
      goToLocation(Number(button.dataset.pageIndex), button.dataset.sectionId);
    });

    document.querySelectorAll("[data-lang]").forEach((button) => {
      button.addEventListener("click", () => setLanguage(button.dataset.lang));
    });

    elements.themeToggle.addEventListener("click", () => {
      setTheme(state.theme === "dark" ? "light" : "dark");
    });

    elements.summaryToggle.addEventListener("click", () => {
      state.summaryVisible = !state.summaryVisible;
      writePreference("summary", state.summaryVisible ? "visible" : "hidden");
      renderSummary();
      updateSummaryToggleLabel();
    });

    elements.navToggle.addEventListener("click", () => {
      const isOpen = elements.body.classList.toggle("nav-open");
      elements.navToggle.setAttribute("aria-expanded", String(isOpen));
    });

    elements.mobileBackdrop.addEventListener("click", closeMobileNav);
    elements.docPage.addEventListener("animationend", (event) => {
      if (event.target === elements.docPage) {
        elements.docPage.classList.remove("is-page-entering");
      }
    });
    elements.main.addEventListener("touchstart", handleSwipeStart, { passive: true });
    elements.main.addEventListener("touchend", handleSwipeEnd, { passive: false });
    elements.main.addEventListener("touchcancel", () => {
      swipeState.tracking = false;
    }, { passive: true });

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape") {
        closeMobileNav();
        return;
      }

      if (shouldIgnorePageArrow(event)) return;

      if (event.key === "ArrowLeft" && goToAdjacentPage(-1)) {
        event.preventDefault();
      }

      if (event.key === "ArrowRight" && goToAdjacentPage(1)) {
        event.preventDefault();
      }
    }, { capture: true });

    let projectLinkWarningChecked = false;

    function hasRenderedContent() {
      return Boolean(
        elements.docPage.children.length &&
        elements.pageNav.children.length &&
        elements.sectionNav.children.length
      );
    }

    function showRenderError(error) {
      console.error("Documentation render failed.", error);
      elements.docPage.innerHTML = `
        <section class="doc-section">
          <h1>Render error</h1>
          <p class="lead">The documentation content loaded, but the page renderer stopped before finishing. Open the browser console for details.</p>
        </section>
      `;
    }

    function safeRender() {
      try {
        validateDocData();
        if (!projectLinkWarningChecked) {
          warnAboutMissingProjectLinks();
          projectLinkWarningChecked = true;
        }
        render();
      } catch (error) {
        showRenderError(error);
      }
    }

    safeRender();
    document.addEventListener("DOMContentLoaded", safeRender, { once: true });
    window.addEventListener("load", safeRender, { once: true });
    window.addEventListener("pageshow", () => {
      if (!hasRenderedContent()) safeRender();
    });
  </script>
</body>
</html>
